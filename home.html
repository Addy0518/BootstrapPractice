    <!-- 倫播效果 -->







    <script>

        $(function () {
            $('.owl-carousel').owlCarousel({
                loop: true,
                // 啟用無限輪播，滑到最後一張後會自動回到第一張，形成循環
                margin: 10,
                nav: false,
                // 顯示左右切換箭頭（上一張／下一張）
                video: true,
                responsive: {
                    0: {
                        items: 1
                    },
                    // 當螢幕寬度 ≥ 0px 時，顯示 1 個項目
                    600: {
                        items: 3
                    },
                    // 當螢幕寬度 ≥ 600px 時，顯示 3 個項目
                    1000: {
                        items: 5
                    }
                    // 當螢幕寬度 ≥ 1000px 時，顯示 5 個項目

                }
            })



            // 滑鼠移進圖片連結時，顯示燈箱
            $(".lightbox").on("click", function (e) {
                e.preventDefault(); // 阻止預設跳轉
                const imgSrc = $(this).attr("href");
                $(".lightbox-image").attr("src", imgSrc);
                $(".lightbox-overlay").fadeIn();
            });

            // 點擊 overlay 背景時關閉燈箱（不包含圖片）
            $(".lightbox-overlay").on("click", function (e) {
                if (!$(e.target).is(".lightbox-image")) {
                    $(this).fadeOut();
                }
            });

            // 點擊關閉按鈕也能關閉
            $(".lightbox-close").on("click", function () {
                $(".lightbox-overlay").fadeOut();
            });

            // 滑動滾輪也能關閉
            $(window).on("scroll", function () {

                $(".lightbox-overlay").fadeOut();


            });



            // 防止點擊圖片時關閉燈箱
            $(".lightbox-image").on("click", function (e) {
                e.stopPropagation();
            });

            //首頁圖片動畫
            $(".box4, .box5, .box6").on("mouseenter", function () {
                // $(this) 是指當前滑鼠移入的 .box4, .box5 或 .box6
                $(this).find('.box, .box1, .box2').css({
                    "height": "400px",
                    "background-color": "#484891"
                    // .find('.box, .box1, .box2') 是去尋找它內部的 figcaption
                });
            }).on("mouseleave", function () {
                $(this).find('.box, .box1, .box2').css({
                    "height": "100px",
                    "background-color": "#22006B"
                })
            })


            $(".bigbox1, .bigbox2, .bigbox3").on("mouseenter", function () {
                // $(this) 是指當前滑鼠移入的 .bigbox
                $(this).css({
                    "transform": "scale(1.05)"
                    // .find('.box, .box1, .box2') 是去尋找它內部的 figcaption
                });
            }).on("mouseleave", function () {
                $(this).css({
                    "transform": "scale(1)"
                })
            })
        })
    </script>
